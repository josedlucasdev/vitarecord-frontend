name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - dev

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔍 Probar conectividad y secretos (Diagnóstico)
        run: |
          echo "Longitud del servidor: ${#SERVER} caracteres"
          echo "Longitud del usuario: ${#USER} caracteres"
          if [ -z "$SERVER" ]; then echo "⚠️ ERROR: FTP_SERVER está vacío"; exit 1; fi
          echo "Probando resolución DNS para: $SERVER"
          nslookup $SERVER || echo "❌ ERROR: No se puede resolver el host $SERVER"
        env:
          SERVER: ${{ secrets.FTP_SERVER }}
          USER: ${{ secrets.FTP_USERNAME }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: |
          npm ci

      - name: 🏗️ Build project
        run: |
          npm run build

      - name: 📂 Sync files (Production)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /app.vitarecord.com/

      - name: 📂 Sync files (Development)
        if: github.ref == 'refs/heads/dev' 
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /dev.app.vitarecord.com/ 
