name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - dev

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project (Production)
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.vitarecord.com/api

      - name: 🏗️ Build project (Development)
        if: github.ref == 'refs/heads/dev'
        run: npm run build
        env:
          VITE_API_BASE_URL: https://dev.api.vitarecord.com/api

      - name: 📂 Sync files (Production)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /app.vitarecord.com/

      - name: 📂 Sync files (Development)
        if: github.ref == 'refs/heads/dev' 
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /dev.app.vitarecord.com/ 
